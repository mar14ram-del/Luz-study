// ─── Screen 02 · Style profile + evolution timeline (interactive)

// because the parent App swaps `key` on tab change.
function AProfile({ hair }) {
  const [active, setActive] = React.useState(0);
  const h = hair || window.__activeHair || HAIRSTYLES[0];
  const num = String((HAIRSTYLES.findIndex(x => x.id === h.id) + 1) || 1).padStart(2, '0');
  const eraStart = h.evolution?.[0]?.year || '';
  const eraEnd = h.evolution?.[h.evolution.length - 1]?.year || '';
  return (
    <div style={{ background: A.paper, minHeight: '100%', color: A.ink, paddingBottom: 40 }}>
      {/* hero */}
      <div style={{ height: 380, background: '#1A1714', position: 'relative', overflow: 'hidden' }}>
        <div style={{ position: 'absolute', inset: 0, background: `radial-gradient(ellipse at 50% 30%, rgba(232,222,208,0.18) 0%, transparent 70%)` }} />
        <div style={{ position: 'absolute', top: 56, left: 20, right: 20, fontFamily: A.mono, fontSize: 9, letterSpacing: 2.5, color: A.tan }}>

        <div style={{ fontFamily: A.serif, fontSize: 19, lineHeight: 1.4, letterSpacing: -0.1 }}>
          {h.description}
        </div>
        <div style={{ fontFamily: A.mono, fontSize: 9, letterSpacing: 2, color: A.muted, marginTop: 18, display: 'flex', gap: 20, textTransform: 'uppercase' }}>

//  · 任何節點都可以新增子節點、上傳圖片、改名
//  · 從根節點往上演化
//  · 不再有等級限制
// Persisted per hairstyle id.
function ASkillTree({ hair }) {
  const storeKey = `cuttingroom_skilltree_${hair.id}`;

  const seed = React.useMemo(() => ({
    nodes: [{ id: 'root', parent: null, label: hair.name }],
  }), [hair.id, hair.name]);

  // 強制把載入的資料中 root 節點 label 校正成當前髮型名稱
  // 處理舊版資料汙染（過去版本曾有所有髮型共用同一份 tree 的 bug）
  const sanitize = (data, hairName) => {
    if (!data || !Array.isArray(data.nodes) || data.nodes.length === 0) {
      return { nodes: [{ id: 'root', parent: null, label: hairName }] };
    }
    const nodes = data.nodes.map(n =>
      n.id === 'root' ? { ...n, label: hairName, parent: null } : n
    );
    // 確保有 root，沒有就補
    if (!nodes.some(n => n.id === 'root')) {
      nodes.unshift({ id: 'root', parent: null, label: hairName });
    }
    return { ...data, nodes };
  };

  const [tree, setTree] = React.useState(() => {
    try {
      const raw = localStorage.getItem(storeKey);
      if (raw) return sanitize(JSON.parse(raw), hair.name);
    } catch {}
    return seed;
  });

  React.useEffect(() => {
    try { localStorage.setItem(storeKey, JSON.stringify(tree)); } catch {}
  }, [tree, storeKey]);

  React.useEffect(() => {
    try {
      const raw = localStorage.getItem(storeKey);
      setTree(raw ? sanitize(JSON.parse(raw), hair.name) : seed);
    } catch {
      setTree(seed);
    }
  }, [storeKey, hair.name]); // eslint-disable-line

  const [editingId, setEditingId] = React.useState(null);

  // helpers
  const ensureSystemNode = (id, parent, label) => {
    setTree(t => {
      if (t.nodes.some(n => n.id === id)) return t;
      return { ...t, nodes: [...t.nodes, { id, parent, label, system: true }] };
    });
  };
  const updateNode = (id, patch) => setTree(t => ({ ...t, nodes: t.nodes.map(n => n.id === id ? { ...n, ...patch } : n) }));
  const addChild = (parentId) => {
    const id = 'n_' + Math.random().toString(36).slice(2, 8);
    setTree(t => ({ ...t, nodes: [...t.nodes, { id, parent: parentId, label: '新節點', image: null }] }));
    setEditingId(id);
  };
  const removeNode = (id) => {
    if (id === 'root') return;
    const parents = {}; tree.nodes.forEach(n => parents[n.id] = n.parent);
    const isDescendant = (nid) => { let c = nid; while (c) { if (c === id) return true; c = parents[c]; } return false; };
    setTree(t => ({ ...t, nodes: t.nodes.filter(n => !isDescendant(n.id)) }));
    setEditingId(null);
  };
  const onPickNodeImage = (id, file) => {
    if (!file) return;
    const r = new FileReader(); r.onload = () => updateNode(id, { image: r.result }); r.readAsDataURL(file);
  };
  // novice/expert 槽位邏輯已移除

  // root click → tier picker
  const onClickNode = (n) => {
    // root 與任何節點：點擊 = 開啟編輯/新增子節點介面
    setEditingId(editingId === n.id ? null : n.id);
  };


  // ─ layout: row = depth, x positions centered under parent.
  const layout = React.useMemo(() => {
    const byParent = {};
    tree.nodes.forEach(n => { const k = n.parent || '__root__'; (byParent[k] = byParent[k] || []).push(n); });
    const positions = {};
    const walk = (id, depth, leftX) => {
      const kids = byParent[id] || [];
      if (kids.length === 0) { positions[id] = { row: depth, x: leftX, width: 1 }; return 1; }
      let acc = 0;
      kids.forEach(k => { acc += walk(k.id, depth + 1, leftX + acc); });
      positions[id] = { row: depth, x: leftX + (acc - 1) / 2, width: acc };
      return acc;
    };
    const totalCols = walk('root', 0, 0) || 1;
    const maxRow = Math.max(0, ...tree.nodes.map(n => positions[n.id]?.row || 0));
    return { positions, totalCols, maxRow };
  }, [tree]);

  // visual constants
  const ROW_H = 110;
  const NODE_W = 132;
  const NODE_H = 56;
  const SIDE_PAD = 24;
  const BOARD_H = (layout.maxRow + 1) * ROW_H + 40;
  const COL_MIN_W = NODE_W + 28;
  const CONTENT_W_PX = layout.totalCols * COL_MIN_W;
  // Container is fluid; canvas inside expands but minimum equals container width so root sits centered when there's only one column.
  const [boardW, setBoardW] = React.useState(360);
  const boardRef = React.useRef(null);
  React.useLayoutEffect(() => {
    if (!boardRef.current) return;
    const ro = new ResizeObserver(([e]) => setBoardW(Math.max(280, e.contentRect.width)));
    ro.observe(boardRef.current);
    return () => ro.disconnect();
  }, []);
  const BOARD_W_PX = Math.max(boardW, CONTENT_W_PX + SIDE_PAD * 2);

  const xFor = (id) => {
    const p = layout.positions[id]; if (!p) return BOARD_W_PX / 2;
    if (layout.totalCols <= 1) return BOARD_W_PX / 2;
    // map x ∈ [0, totalCols-1] → centered range within board
    const span = (layout.totalCols - 1) * COL_MIN_W;
    const startX = (BOARD_W_PX - span) / 2;
    return startX + p.x * COL_MIN_W;
  };
  const yFor = (id) => {
    const p = layout.positions[id]; if (!p) return BOARD_H - ROW_H / 2;
    return BOARD_H - (p.row * ROW_H + ROW_H / 2);
  };

  return (
    <div style={{ padding: '0 20px' }}>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'baseline', fontFamily: A.mono, fontSize: 9, letterSpacing: 1.6, color: A.muted, marginBottom: 10, textTransform: 'uppercase' }}>
        <span>↘ 點節點開始建構</span>
        <span>{tree.nodes.length} 個節點</span>
      </div>

      {/* tree board */}
      <div ref={boardRef} style={{ position: 'relative', overflowX: 'auto', WebkitOverflowScrolling: 'touch', border: `1px solid ${A.ink}`, background: A.wash }}>
        <div style={{ position: 'relative', width: BOARD_W_PX, height: BOARD_H }}>
          {/* grid paper */}
          <div style={{
            position: 'absolute', inset: 0,
            backgroundImage: `linear-gradient(${A.ink}11 1px, transparent 1px), linear-gradient(90deg, ${A.ink}11 1px, transparent 1px)`,
            backgroundSize: '16px 16px', opacity: 0.6,
          }} />

          {/* edges */}
          <svg width={BOARD_W_PX} height={BOARD_H} style={{ position: 'absolute', inset: 0, pointerEvents: 'none' }}>
            {tree.nodes.filter(n => n.parent).map(n => {
              const sx = xFor(n.parent), sy = yFor(n.parent) - NODE_H / 2;
              const ex = xFor(n.id),     ey = yFor(n.id) + NODE_H / 2;
              const my = (sy + ey) / 2;
              return (
                <path key={n.id}
                  d={`M ${sx} ${sy} C ${sx} ${my}, ${ex} ${my}, ${ex} ${ey}`}
                  fill="none" stroke={A.ink} strokeOpacity={0.5} strokeWidth={1} />
              );
            })}
          </svg>

          {/* nodes (text-only) */}
          {tree.nodes.map(n => {
            const cx = xFor(n.id), cy = yFor(n.id);
            const isRoot = n.id === 'root';
            const isSystem = false; // 所有節點皆可編輯
            const dark = isRoot;
            return (
              <button key={n.id}
                onClick={() => onClickNode(n)}
                style={{
                  position: 'absolute',
                  left: cx - NODE_W / 2, top: cy - NODE_H / 2,
                  width: NODE_W, height: NODE_H,
                  background: dark ? A.ink : A.paper,
                  color: dark ? A.paper : A.ink,
                  border: `1px solid ${dark ? A.ink : (isSystem ? A.ink : A.muted)}`,
                  boxShadow: dark ? `3px 3px 0 ${A.ink}` : 'none',
                  display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center',
                  cursor: 'pointer', textAlign: 'center', padding: '6px 10px',
                  fontFamily: 'inherit',
                }}>
                <div style={{ fontFamily: A.mono, fontSize: 8, letterSpacing: 1.6, color: dark ? A.tan : A.muted, textTransform: 'uppercase' }}>
                  {isRoot ? '◆ ROOT' : 'NODE'}
                </div>
                <div style={{ fontFamily: A.serif, fontSize: 14, fontStyle: 'italic', lineHeight: 1.1, marginTop: 2,
                  whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis', maxWidth: '100%' }}>
                  {n.label || '—'}
                </div>
              </button>
            );
          })}
        </div>
      </div>

      {/* tier picker removed */}

      {/* lesson modal removed */}

      {/* ── 節點編輯器 ── */}
      {editingId && (() => {
        const n = tree.nodes.find(x => x.id === editingId);
        if (!n) return null;
        return (
          <div style={{ marginTop: 14, border: `1px solid ${A.ink}`, background: A.paper, padding: 14 }}>
            <div style={{ display: 'flex', alignItems: 'baseline', justifyContent: 'space-between', marginBottom: 10 }}>
              <div style={{ fontFamily: A.mono, fontSize: 9, letterSpacing: 2, color: A.muted, textTransform: 'uppercase' }}>NODE</div>
              <button onClick={() => setEditingId(null)} style={{ background: 'transparent', border: 'none', cursor: 'pointer', fontFamily: A.mono, fontSize: 11, color: A.muted }}>✕</button>
            </div>
            <input value={n.label} onChange={e => updateNode(n.id, { label: e.target.value })}
              placeholder="節點名稱"
              style={{ width: '100%', padding: '8px 10px', marginBottom: 10, fontFamily: A.serif, fontSize: 18, fontStyle: 'italic', background: A.wash, border: `1px solid ${A.ink}`, color: A.ink, outline: 'none' }} />
            <div style={{ fontFamily: A.mono, fontSize: 9, letterSpacing: 1.6, color: A.muted, marginBottom: 6, textTransform: 'uppercase' }}>圖片 · IMAGE</div>
            <div style={{ display: 'flex', gap: 10, alignItems: 'center' }}>
              <div style={{ width: 80, height: 80, border: `1px solid ${A.muted}`, background: n.image ? '#000' : A.wash, overflow: 'hidden', flexShrink: 0 }}>
                {n.image && <img src={n.image} alt="" style={{ width: '100%', height: '100%', objectFit: 'cover' }} />}
              </div>
              <div style={{ flex: 1 }}>
                <input type="file" accept="image/*" onChange={e => onPickNodeImage(n.id, e.target.files && e.target.files[0])}
                  style={{ fontFamily: A.mono, fontSize: 11, color: A.ink }} />
                {n.image && (
                  <button onClick={() => updateNode(n.id, { image: null })}
                    style={{ marginTop: 8, padding: '4px 10px', background: 'transparent', border: `1px solid ${A.muted}`, fontFamily: A.mono, fontSize: 9, letterSpacing: 1.5, cursor: 'pointer', color: A.muted, textTransform: 'uppercase' }}>移除圖片</button>
                )}
              </div>
            </div>
            <div style={{ display: 'flex', gap: 10, marginTop: 14 }}>
              <button onClick={() => addChild(n.id)}
                style={{ flex: 1, padding: '10px 12px', background: A.ink, color: A.paper, border: 'none', cursor: 'pointer', fontFamily: A.mono, fontSize: 10, letterSpacing: 2, textTransform: 'uppercase' }}>+ 新增子節點</button>
              <button onClick={() => removeNode(n.id)}
                style={{ padding: '10px 12px', background: 'transparent', color: A.accent, border: `1px solid ${A.accent}`, cursor: 'pointer', fontFamily: A.mono, fontSize: 10, letterSpacing: 2, textTransform: 'uppercase' }}>刪除</button>
            </div>
          </div>
        );
      })()}
    </div>
  );
}

function loadFavs() {
  try { return JSON.parse(localStorage.getItem(FAVS_KEY) || '[]'); } catch { return []; }
}
function saveFavs(arr) {
  try { localStorage.setItem(FAVS_KEY, JSON.stringify(arr)); } catch {}

}
function isFav(name) {
  return loadFavs().some(h => h.name === name);

  saveFavs([{ ...hair, savedAt: Date.now() }, ...cur].slice(0, 50));
  return true;
}
function removeFav(name) {

請使用以下嚴格格式 (只回傳 JSON,不要 markdown):

  "era": "代表年代如 1950s 或 2020s",

          { year: '2000', label: '亞洲在地化', body: '日韓設計師加入細碎與輕量化處理,使其更貼合東亞臉型。' },
          { year: '2015', label: '社群擴散', body: 'Instagram 與 YouTube 教學讓技法被全球年輕設計師快速複製。' },
          { year: '2024', label: '當代演繹', body: '結合短打、紋理與留白,演化為今日多元的個人風格表達。' },
        ],
        source: 'fallback',
      };
    };

    const finishWith = (data) => {

function readStore() {
  try { return JSON.parse(localStorage.getItem(STORE_KEY) || '{}'); }
  catch { return {}; }
}
function writeStore(patch) {
  const prev = readStore();
  const next = { ...prev, ...patch };
  try { localStorage.setItem(STORE_KEY, JSON.stringify(next)); } catch {}
  return next;
}

function usePersistedState(key, initial) {
  const [v, setV] = React.useState(() => {
    const s = readStore();
    return key in s ? s[key] : initial;
  });
  const set = React.useCallback((val) => {
    setV(prev => {
      const next = typeof val === 'function' ? val(prev) : val;
      writeStore({ [key]: next });
      return next;
    });
  }, [key]);
  return [v, set];
}

function useStore() {
  const [logs, setLogs] = usePersistedState('logs', []);
  const [notes, setNotes] = usePersistedState('notes', {}); // { [hairId]: string }
  const [userName, setUserName] = usePersistedState('userName', '');

    setLogs(prev => [{ id: `log-${Date.now()}`, date: today, ...entry }, ...(prev || [])]);
  };

  const setNote = (hairId, text) => setNotes(prev => ({ ...(prev || {}), [hairId]: text }));

  return {

function TimerScreen({ open, onClose, hair }) {

// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', children }) {

  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel"
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>

      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

function TweakColor({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <input type="color" className="twk-swatch" value={value}
             onChange={(e) => onChange(e.target.value)} />
    </div>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});

})();

// ── main app ──
const { AHome, AProfile, AFavorites, ASteps, AVideo, AWorks, ARewards, A } = window.VariantA;
const { ASearchPanel } = window;
const { TodayHome, LogPracticeSheet, TimerScreen, NotesSheet, FAB, Mono } = window.MobileExtras;
const { TweaksPanel, useTweaks, TweakSection, TweakRadio, TweakSlider, TweakToggle, TweakText } = window;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "homeMode": "magazine",
  "userAlias": "MARC",
  "fontScale": 1.05,
  "darkMode": true,
  "reduceMotion": false
}/*EDITMODE-END*/;

// ─── Tab bar — 3 tabs only: HOME · SEARCH · SKILLS
function TabBar({ active, onTab, dark }) {
  const items = [
    { id: 'home',   label: 'HOME',   glyph: '◐' },
    { id: 'search', label: 'SEARCH', glyph: '⌕' },
    { id: 'skills', label: 'SKILLS', glyph: '✦' },
  ];
  const bg = dark ? 'rgba(15,14,13,0.92)' : 'rgba(245,241,232,0.96)';
  const border = dark ? 'rgba(245,241,232,0.12)' : 'rgba(15,14,13,0.12)';
  const muted = dark ? 'rgba(245,241,232,0.45)' : 'rgba(15,14,13,0.45)';
  return (
    <div style={{
      position: 'fixed', bottom: 0, left: 0, right: 0, zIndex: 55,
      background: bg, backdropFilter: 'blur(18px)', WebkitBackdropFilter: 'blur(18px)',
      borderTop: `1px solid ${border}`,
      paddingBottom: 'calc(env(safe-area-inset-bottom, 0px) + 10px)',
      paddingTop: 12,
      display: 'flex', justifyContent: 'space-around',
    }}>
      {items.map(it => {
        const on = active === it.id;
        return (
          <button key={it.id} onClick={() => onTab(it.id)}
            style={{ background: 'transparent', border: 'none', cursor: 'pointer', padding: '6px 10px',
              display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 4,
              color: on ? '#C9452F' : muted, fontFamily: A.mono, fontSize: 9, letterSpacing: 1.8,
              minWidth: 64 }}>
            <span style={{ fontSize: 18, lineHeight: 1 }}>{it.glyph}</span>
            <span>{it.label}</span>
            <span style={{ width: 18, height: 2, background: on ? '#C9452F' : 'transparent' }} />
          </button>
        );
      })}
    </div>
  );
}

function App() {
  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const [tab, setTab] = React.useState('home');
  const [activeHair, setActiveHair] = React.useState(null);
  const [logOpen, setLogOpen] = React.useState(false);
  const [logHairId, setLogHairId] = React.useState(null);
  const [timerHair, setTimerHair] = React.useState(null);
  const [notesHair, setNotesHair] = React.useState(null);

  React.useEffect(() => {
    document.documentElement.style.setProperty('--cr-fs', String(tweaks.fontScale || 1));
    document.body.classList.toggle('cr-dark', !!tweaks.darkMode);
    document.body.classList.toggle('cr-reduce-motion', !!tweaks.reduceMotion);
  }, [tweaks.fontScale, tweaks.darkMode, tweaks.reduceMotion]);

  const openProfile = (hair) => {
    window.__activeHair = hair;
    setActiveHair(hair);
    setTab('profile');
  };

  React.useEffect(() => { window.__openProfile = openProfile; }, []);

  const openLog = (hairId) => { setLogHairId(hairId || null); setLogOpen(true); };
  const openTimer = (hair) => setTimerHair(hair || window.HAIR_DATA.HAIRSTYLES[0]);
  const openNotes = (hair) => setNotesHair(hair || window.HAIR_DATA.HAIRSTYLES[0]);

  const homeView = tweaks.homeMode === 'magazine'
    ? <AHome alias={tweaks.userAlias} />
    : <TodayHome
        alias={tweaks.userAlias}
        onOpenStyle={openProfile}
        onOpenLog={() => openLog()}
        onOpenTimer={openTimer}
        onOpenContinue={() => openProfile(window.HAIR_DATA.HAIRSTYLES[0])}
        onOpenNotes={openNotes}
      />;

  const screen = {
    home: homeView,
    search: <ASearchPanel onSelect={openProfile} />,
    skills: <AFavorites onOpen={openProfile} alias={tweaks.userAlias} />,
    profile: <AProfile hair={activeHair} />,
  }[tab] || homeView;

  const dark = !!tweaks.darkMode;
  const tabBarH = 'calc(78px + env(safe-area-inset-bottom, 0px))';

  // For tabbar highlight: profile is reached via Search/Skills, so keep last real tab lit
  const [lastRealTab, setLastRealTab] = React.useState('home');
  React.useEffect(() => { if (tab !== 'profile') setLastRealTab(tab); }, [tab]);
  const tabBarActive = tab === 'profile' ? lastRealTab : tab;

  return (
    <div style={{
      width: '100%', height: '100%',
      background: dark ? '#0F0E0D' : A.paper,
      fontFamily: '-apple-system, system-ui, sans-serif',
      WebkitFontSmoothing: 'antialiased',
      position: 'relative',
    }}>
      <div key={tab} style={{
        height: '100%',
        overflowY: 'auto',
        WebkitOverflowScrolling: 'touch',
        paddingBottom: tabBarH,
        paddingTop: 'env(safe-area-inset-top, 0px)',
        animation: 'fade .25s ease',
      }}>
        {screen}
      </div>

      <FAB
        hidden={tab === 'search'}
        dark={dark}
        onLog={() => openLog()}
        onTimer={() => openTimer(activeHair || window.HAIR_DATA.HAIRSTYLES[0])}
      />

      <LogPracticeSheet open={logOpen} onClose={() => setLogOpen(false)} defaultHairId={logHairId} />
      <TimerScreen open={!!timerHair} onClose={() => setTimerHair(null)} hair={timerHair} />
      <NotesSheet open={!!notesHair} onClose={() => setNotesHair(null)} hair={notesHair} />

      <TabBar active={tabBarActive} onTab={setTab} dark={dark} />

      <TweaksPanel title="Tweaks">
        <TweakSection label="用戶 · IDENTITY" />
        <TweakText
          label="代號 Alias"
          value={tweaks.userAlias || ''}
          placeholder="e.g. Vincent"
          onChange={v => setTweak('userAlias', v)}
        />
        <TweakSection label="首頁 · HOME" />
        <TweakRadio
          label="Mode"
          value={tweaks.homeMode}
          options={['today', 'magazine']}
          onChange={v => setTweak('homeMode', v)}
        />
        <TweakSection label="閱讀 · READING" />
        <TweakSlider
          label="Font Size"
          value={Math.round((tweaks.fontScale || 1) * 100)}
          min={85} max={125} step={5} unit="%"
          onChange={v => setTweak('fontScale', v / 100)}
        />
        <TweakToggle
          label="Dark Mode"
          value={!!tweaks.darkMode}
          onChange={v => setTweak('darkMode', v)}
        />
        <TweakToggle
          label="Reduce Motion"
          value={!!tweaks.reduceMotion}
          onChange={v => setTweak('reduceMotion', v)}
        />
      </TweaksPanel>

      <style>{`
        @keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
        [data-ios-status-bar] { display: none !important; }
      `}</style>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);

</script>
</body>
</html>
