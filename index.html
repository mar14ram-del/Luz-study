<!doctype html>
<html lang="zh-TW">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="LUZ STYLE" />
<meta name="theme-color" content="#F5F1E8" />
<title>LUZ STYLE — Art Gallery</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400;1,600&family=Inter+Tight:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Noto+Serif+TC:wght@400;700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  html,body{margin:0;padding:0;background:#F5F1E8;font-family:-apple-system,system-ui,sans-serif;width:100%;overflow-x:hidden;-webkit-tap-highlight-color:transparent;overscroll-behavior-y:contain}
  *{box-sizing:border-box}
  body.app-mode{height:100vh;height:100dvh;overflow:hidden;position:fixed;inset:0}
  #root{width:100%;height:100%}
  button{font-family:inherit}
  html{--cr-fs:1}
  body{font-size:calc(16px * var(--cr-fs))}
  body.cr-dark{background:#0F0E0D}
  body.cr-reduce-motion *,body.cr-reduce-motion *::before,body.cr-reduce-motion *::after{animation-duration:.001s!important;transition-duration:.001s!important}

  /* iOS / Android 相容性補強 */
  html{-webkit-text-size-adjust:100%;text-size-adjust:100%}
  input,button,textarea{font-size:16px}
  input,textarea{-webkit-appearance:none;appearance:none;border-radius:0}
  body{padding-top:env(safe-area-inset-top);padding-bottom:env(safe-area-inset-bottom)}
</style>
